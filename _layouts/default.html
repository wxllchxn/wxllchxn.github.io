<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="site-body layout-default">
  {{ content }}
  <div id="contact-form-toast" class="contact-toast" role="status" aria-live="polite" aria-atomic="true" hidden></div>
  <footer class="site-footer">
    <div class="footer-inner">
      &copy; {{ site.time | date: '%Y' }} {{ site.author }}
      <a href="{{ site.github_url }}" target="_blank" rel="noopener noreferrer">GitHub</a>
    </div>
  </footer>
</body>
</html>
